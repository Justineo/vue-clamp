name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp check
      - run: vp test
      - run: google-chrome --version
      - run: vp run test:browser
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
      - run: vp run build
      - name: Publish preview package
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: vp dlx pkg-pr-new publish --compact ./packages/vue-clamp
      - name: Deploy website to Void
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        working-directory: packages/website
        run: vp exec void deploy --skip-build --project vue-clamp
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
